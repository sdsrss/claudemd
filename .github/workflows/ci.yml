name: ci

# Tag pushes run the full matrix too (v0.50.0). The marketplace channel
# serves the git tag/release directly, but only the npm channel had a
# tag-time test gate (npm-publish.yml, Linux-only). Without this trigger a
# red-at-tag-time release reached marketplace consumers with no check status
# on the tagged commit. The atomic ship flow (push main + push tag) runs the
# matrix twice on the same commit — accepted cost for channel parity.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        # 20 = engines floor (node:sqlite absent — exercises the degradation
        # path where memory-maintenance self-skips); 22 = node:sqlite present —
        # exercises the real cross-layer query. With only [20] the actual SQL
        # path was CI-invisible: a query/schema regression shipped green while
        # the suite reported the test as skipped (2026-07-17 audit).
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install tools
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install jq shellcheck coreutils
            echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"
          fi
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -y && sudo apt-get install -y jq shellcheck
          fi
      - name: Shellcheck (blocking at warning+; info advisory)
        run: |
          # 2026-07-24 audit P2-11: was warn-only (`|| echo`) — a real regression
          # (unquoted expansion in a new hook) could never redden CI. Baseline
          # cleaned same day (env-hygiene shell directive, dead TRIGGER_RE);
          # warning+ now blocks, info-level stays a visible non-blocking report.
          shellcheck --severity=warning hooks/*.sh hooks/lib/*.sh scripts/*.sh tests/lib/*.sh
          shellcheck hooks/*.sh hooks/lib/*.sh scripts/*.sh tests/lib/*.sh \
            || echo "shellcheck info-level notes above (non-blocking)"
      - name: Reject bash 4+ constructs in hooks (macOS bash 3.2 portability gate)
        run: |
          # v0.23.8 — static backstop for the macOS bash-3.2 regression class.
          # v0.23.6 shipped `declare -A`, which errors on the system /bin/bash
          # 3.2 the CC harness runs hooks under; Linux CI was green and the
          # macOS leg uses Homebrew bash 5 (gnubin on PATH), so neither caught
          # it at runtime (see feedback_macos_shell_portability). Rejects
          # bash-4+ constructs in hook sources. Patterns are whitespace- and
          # flag-tolerant (declare/local/typeset with any -...A flag cluster,
          # tab or multi-space) and cover array/pattern case-mod
          # (${arr[@]^^}, ${name^a}). Comments are stripped per-line first so
          # prose mentioning a construct (the fix-notes in mem-audit.sh /
          # pre-bash-safety-check.sh) does not trip the gate.
          set -u
          pat='(declare|local|typeset)[[:space:]]+-[A-Za-z]*A|mapfile|readarray|\$\{[A-Za-z_][A-Za-z0-9_]*(\[[^]]*\])?(\^\^|,,|\^|,)'
          found=0
          for f in hooks/*.sh hooks/lib/*.sh; do
            m=$(sed -E 's/^[[:space:]]*#.*$//; s/[[:space:]]#.*$//' "$f" | grep -nE "$pat") || continue
            echo "::error::bash 4+ construct in $f (breaks macOS /bin/bash 3.2):"
            printf '%s\n' "$m" | sed 's|^|  |'
            found=1
          done
          [ "$found" = 0 ] || exit 1
          echo "OK: no bash 4+ constructs in hooks (macOS bash 3.2 safe)"
      - name: Diagnose macOS /tmp + find behavior (informational, non-gating)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          # v0.5.0 §1.A diagnostic — runs only on macOS, never gates CI.
          # Captures ground-truth data for the v0.4.1/v0.4.2 sandbox-disposal
          # Case 8 failure (find /tmp -newer ref returned no fresh claudemd-*
          # entries despite documented mkdir + sleep). v0.5.0 §1.B refactor
          # bypassed real /tmp in tests via CLAUDEMD_SCAN_SPECS_OVERRIDE; this
          # step records whether the production hook's real /tmp scan still
          # works on this runner image so a future fix has data.
          set +e
          echo "=== environment ==="
          uname -a
          echo "BASH_VERSION=$BASH_VERSION  TMPDIR=${TMPDIR:-<unset>}"
          which find && find --version 2>&1 | head -2
          echo "/tmp realpath: $(python3 -c 'import os; print(os.path.realpath("/tmp"))' 2>&1)"
          echo "/tmp -maxdepth 1 entries: $(find /tmp -maxdepth 1 2>/dev/null | wc -l | tr -d ' ')"
          echo "=== timestamp probe ==="
          REF=$(mktemp)
          REF_MTIME=$(stat -f %m "$REF" 2>&1)
          sleep 1
          MARKER=$(mktemp -d "/tmp/claudemd-test-debug.XXXXXX")
          MK_MTIME=$(stat -f %m "$MARKER" 2>&1)
          echo "ref mtime    = $REF_MTIME  ($REF)"
          echo "marker mtime = $MK_MTIME  ($MARKER)"
          echo "delta        = $((MK_MTIME - REF_MTIME))s"
          echo "=== find -newer ref output (raw) ==="
          find /tmp -maxdepth 1 -newer "$REF" 2>&1 | head -20
          echo "=== find -maxdepth 1 unfiltered (sample) ==="
          find /tmp -maxdepth 1 2>&1 | head -10
          echo "=== production hook against real /tmp ==="
          rm -rf "$HOME/.claude/.claudemd-state" 2>/dev/null
          mkdir -p "$HOME/.claude/.claudemd-state"
          touch "$HOME/.claude/.claudemd-state/session-start.ref"
          sleep 1
          mkdir "/tmp/claudemd-debug-marker_$$" 2>&1
          echo "marker created: /tmp/claudemd-debug-marker_$$"
          ls -la "/tmp/claudemd-debug-marker_$$" 2>&1
          OUT=$(bash hooks/sandbox-disposal-check.sh <<<'{}' 2>&1)
          echo "hook stderr (expected to mention claudemd-debug-marker): '$OUT'"
          rm -rf "/tmp/claudemd-debug-marker_$$" "$MARKER" "$REF"
          exit 0
      - name: Run test suite
        run: bash tests/run-all.sh
